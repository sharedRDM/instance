from invenio_saml.handlers import default_account_setup, acs_handler_factory
from invenio_config_tugraz.utils import tugraz_account_setup_extension
from invenio_saml.handlers import default_account_info




def account_info_with_affiliation_fix(attributes, remote_app):
    """`default_account_info` extended by a fix for affiliations.

    Namely, if `account[_info["profile"]["affiliations"] is None` then acs_handler fails
    for `default_account_info`.
    """
    account_info: dict = default_account_info(attributes, remote_app)

    try:
        if not account_info["user"]["profile"].get("affiliations"):
            account_info["user"]["profile"]["affiliations"] = ""
    except KeyError:
        pass

    return account_info


def tugraz_account_setup(user, account_info):
    """Adds tugraz-authentication in addition to default setup."""
    default_account_setup(user, account_info)
    tugraz_account_setup_extension(user, account_info)



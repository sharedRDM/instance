          mkdir .venv
          uv venv .venv

      - name: Change pyproject.toml no override
        run: sed -i "s/\"invenio-override ~=${OVERRIDE_VERSION}\",//g" pyproject.toml

      - name: Update and relock uv.lock file
        run: |
          source .venv/bin/activate
          uv pip uninstall invenio-override || true
          uv lock --upgrade-package invenio-override
          deactivate

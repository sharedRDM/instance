from invenio_records_resources.services.custom_fields import BaseListCF
from marshmallow import fields
from marshmallow_utils.fields import SanitizedUnicode

class ExperimentsCF(BaseListCF):
    """Experiments with title and program."""

    def __init__(self, name, **kwargs):
        """Constructor."""
        super().__init__(
          name,
          field_cls=fields.Nested,
          field_args=dict(
            nested= dict(
                title=SanitizedUnicode(),
                extra=SanitizedUnicode(),
                program=SanitizedUnicode(),
            )
          ),
          multiple=True,
          **kwargs
        )


    @property
    def mapping(self):
        """Return the mapping."""
        return {
            "properties": {
                "title": {
                    "type": "text"
                },
                "extra": {
                    "type": "text"
                },
                "program": {
                    "type": "text"
                },
            }
        }
        
RDM_CUSTOM_FIELDS = [
    ExperimentsCF(name="experiments")
]

